<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倆口田｜線上下單</title>

<style>
body { font-family: sans-serif; max-width: 720px; margin: auto; background:#f6f7f3; padding:16px;}
.product { border-bottom:1px solid #ddd; padding:12px 0;}
.product.sold-out { opacity:0.5;}
.stock-low { color:#c84a4a; font-weight:bold;}
.stock-mid { color:#e6a100;}
button { background:#3f6b3f; color:white; padding:10px; border:none; width:100%; margin-top:10px;}
input { width:100%; padding:8px; margin-top:6px;}
</style>
</head>

<body>

<h2>倆口田｜線上下單</h2>

<div id="productList"></div>

<h3>收件資料</h3>
<input id="customerName" placeholder="姓名">
<input id="customerPhone" placeholder="電話">
<input id="customerAddress" placeholder="地址">

<button onclick="prepareOrder()">顯示訂單內容</button>

<pre id="orderOutput">尚未產生訂單</pre>

<button onclick="sendLine()">LINE 傳送訂單</button>

<script>

const gasUrl = "你的GAS網址";
const lineId = "733fsbwp";

let products = [];
let quantities = {};

// ===== 載入商品 =====
async function loadProducts(){
  const res = await fetch(gasUrl);
  const data = await res.json();

  products = data.products;

  quantities = Object.fromEntries(products.map(p=>[p.id,0]));

  renderProducts();
}

// ===== 渲染商品 =====
function renderProducts(){
  const el = document.getElementById('productList');

  el.innerHTML = products.map(p=>{

    let stockHtml = '';

    if(p.soldOut){
      stockHtml = `<div class="stock-low">已完售</div>`;
    }else if(p.remainingQty !== null){
      if(p.remainingQty <= 5){
        stockHtml = `<div class="stock-low">⚠️ 只剩 ${p.remainingQty}${p.unit}</div>`;
      }else if(p.remainingQty <= 10){
        stockHtml = `<div class="stock-mid">剩 ${p.remainingQty}${p.unit}</div>`;
      }
    }

    return `
      <div class="product ${p.soldOut?'sold-out':''}">
        <b>${p.name}</b><br>
        ${p.price}元 / ${p.unit}<br>
        ${stockHtml}

        <input type="number" min="0" value="${quantities[p.id]}"
          onchange="setQty('${p.id}', this.value)"
          ${p.soldOut?'disabled':''}>
      </div>
    `;
  }).join('');
}

// ===== 設定數量（含限量）=====
function setQty(id, value){
  const p = products.find(x=>x.id===id);
  let qty = Math.max(0, Number(value)||0);

  if(p.remainingQty !== null && qty > p.remainingQty){
    qty = p.remainingQty;
    alert(`「${p.name}」最多只能買 ${p.remainingQty}${p.unit}`);
  }

  quantities[id] = qty;
  renderProducts();
}

// ===== 產生訂單 =====
function prepareOrder(){

  let text = '';
  let items = [];
  let total = 0;

  products.forEach(p=>{
    const qty = quantities[p.id];
    if(qty>0){
      items.push({id:p.id, qty});
      text += `${p.name} x ${qty}\n`;
      total += p.price * qty;
    }
  });

  if(items.length===0){
    alert("請選商品");
    return;
  }

  const orderText =
`【倆口田訂單】

${text}
總金額：${total}元

收件人：${customerName.value}
電話：${customerPhone.value}
地址：${customerAddress.value}`;

  document.getElementById('orderOutput').textContent = orderText;

  window.currentOrder = {
    items,
    itemsText: text,
    total
  };
}

// ===== 傳送 LINE + 寫入 GAS =====
async function sendLine(){

  if(!window.currentOrder){
    alert("請先產生訂單");
    return;
  }

  const payload = {
    orderId: Date.now().toString(),
    customerName: customerName.value,
    phone: customerPhone.value,
    receiverName: customerName.value,
    receiverPhone: customerPhone.value,
    receiverAddress: customerAddress.value,
    items: window.currentOrder.items,
    itemsText: window.currentOrder.itemsText,
    subtotal: window.currentOrder.total,
    total: window.currentOrder.total
  };

  const res = await fetch(gasUrl,{
    method:'POST',
    body: JSON.stringify(payload)
  });

  const r = await res.json();

  if(r.status==='duplicate'){
    alert("訂單已送出，請勿重複");
    return;
  }

  const lineUrl =
    `https://line.me/R/oaMessage/@${lineId}?` +
    encodeURIComponent(document.getElementById('orderOutput').textContent);

  window.open(lineUrl);

}

loadProducts();

</script>

</body>
</html>
